  #        cpus: "0.10"
  #        memory: 64M
  #  security_opt:
  #    - no-new-privileges:true
  #  networks:
  #    - task-network

  prometheus:
    container_name: prometheus
    image: prom/prometheus:v3.2.1
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    env_file:
      - ../.env.production
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:${PROMETHEUS_PORT:-9090}"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/web.yml:/etc/prometheus/web.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.config.file=/etc/prometheus/web.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--storage.tsdb.retention.size=2GB"
      - "--web.enable-lifecycle"
      - "--log.level=warn"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "${PROMETHEUS_PORT:-9090}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M
    security_opt:
      - no-new-privileges:true
    networks:
      - task-network

  grafana:
    container_name: grafana
    image: grafana/grafana:11.6.1
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    env_file:
      - ../.env.production
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:${GRAFANA_PORT:-3000}"
    environment:
      - GF_SECURITY_ADMIN_USER:${GRAFANA_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_SECURITY_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${GRAFANA_PORT:-3000}/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 64M
    security_opt:
      - no-new-privileges:true
    networks:
      - task-network

volumes:
  postgres_data:
    name: postgres_data
    driver: local
  prometheus_data:
    name: prometheus_data
    driver: local
  grafana_data:
    name: grafana_data
    driver: local

networks:
  task-network:
    driver: bridge
