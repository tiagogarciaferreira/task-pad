services:

  app:
    container_name: app
    image: tiagogferreirainfnet/task-pad:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:4000:4000"
    env_file:
      - ../.env.development
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 128M
    security_opt:
      - no-new-privileges:true
    networks:
      - task-network

  postgres:
    container_name: postgres
    image: postgres:17.1-alpine
    restart: unless-stopped
    shm_size: 64mb
    ports:
      - "127.0.0.1:5432:5432"
    env_file:
      - ../.env.development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M
    security_opt:
      - no-new-privileges:true
    networks:
      - task-network

  prometheus:
    container_name: prometheus
    image: prom/prometheus:v3.2.1
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.config.file=/etc/prometheus/web.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--storage.tsdb.retention.size=2GB"
      - "--web.enable-lifecycle"
      - "--log.level=warn"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ../monitoring/prometheus.development.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/web.development.yml:/etc/prometheus/web.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9090"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M
    security_opt:
      - no-new-privileges:true
    networks:
      - task-network

  grafana:
    container_name: grafana
    image: grafana/grafana:11.6.1
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - ../.env.development
    volumes:
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.30"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 64M
    security_opt:
      - no-new-privileges:true
    networks:
      - task-network

volumes:
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  task-network:
    driver: bridge
