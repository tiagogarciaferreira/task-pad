services:

  app:
    container_name: app
    image: tiagogferreirainfnet/task-pad:latest
    restart: unless-stopped
    #depends_on:
    #  postgres:
    #    condition: service_healthy
    env_file:
      - ../.env.production
    ports:
      - "127.0.0.1:${PORT:-4000}:${PORT:-4000}"
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "require('http').get('http://localhost:4000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 128M
    security_opt:
      - no-new-privileges:true
    networks:
      - task-network

  #postgres:
  #  container_name: postgres
  #  image: postgres:17.1-alpine
  #  restart: unless-stopped
  #  shm_size: 64mb
  #  env_file:
  #    - ../.env.production
  #  ports:
  #    - "127.0.0.1:${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}"
  #  volumes:
  #    - postgres_data:/var/lib/postgresql/data
  #  healthcheck:
  #    test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-postgres}", "-d", "${POSTGRES_DB:-postgres}"]
  #    interval: 10s
