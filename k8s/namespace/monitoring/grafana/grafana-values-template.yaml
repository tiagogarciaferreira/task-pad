admin:
  existingSecret: "grafana-secret"
  userKey: username
  passwordKey: password

persistence:
  type: pvc
  enabled: true
  storageClassName: "gp3"
  size: 2Gi

deploymentStrategy:
  type: Recreate

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: ${PROMETHEUS_URL_AWS_EKS}
        access: proxy
        isDefault: true
        editable: false

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"

service:
  type: NodePort
  nodePort: 32000
