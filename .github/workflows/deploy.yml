name: Build and Deploy

on:
  push:
    branches: ['main']
    paths-ignore:
      - 'k8s/**'
      - '.angular/**'
      - '.editorconfig'
      - '.prettierrc'
      - '.gitignore'
      - '.env.template'
      - '.github/**'
      - 'dist/**'
      - 'docker/**'
      - 'tasks.json'
      - 'proxy.conf.js'
      - 'Makefile'
      - 'README.md'

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: '24.14.1'
      ENVIRONMENT: 'production'
      DOCKER_HUB_REPO: ${{ secrets.DOCKER_HUB_USERNAME }}/task-pad

    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm analyze

      - name: Install Angular CLI
        run: npm install -g @angular/cli@21.2.6

      - name: Create environment files
        run: |
          mkdir -p src/environments
          cp src/environments/environment.template.ts src/environments/environment.ts

          cat > src/environments/environment.production.ts << EOF
          export const environment = {
            production: true,
            firebase: {
              apiKey: '${{ secrets.FIREBASE_API_KEY }}',
              authDomain: '${{ secrets.FIREBASE_AUTH_DOMAIN }}',
              projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
              storageBucket: '${{ secrets.FIREBASE_STORAGE_BUCKET }}',
              messagingSenderId: '${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}',
              appId: '${{ secrets.FIREBASE_APP_ID }}'
            }
          };
          EOF

          test -f src/environments/environment.ts || exit 1
          test -f src/environments/environment.production.ts || exit 1

      - name: Build application
        run: ng build --configuration=${{ env.ENVIRONMENT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Get version
        id: package-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Found version: $VERSION"

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKER_HUB_REPO }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.package-version.outputs.version }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=${{ env.ENVIRONMENT }}
            BUILD_MODE=${{ env.ENVIRONMENT }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0
        with:
          cosign-release: 'v3.0.3'

      - name: Decode Cosign signing key
        run: |
          echo "${{ secrets.COSIGN_PRIVATE_KEY }}" | base64 -d > cosign.key
          chmod 600 cosign.key

          echo "${{ secrets.COSIGN_PUBLIC_KEY }}" | base64 -d > cosign.pub
          chmod 600 cosign.pub

      - name: Sign Docker image
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest  }}
        run: |
          readarray -t tag_array <<< "${TAGS}"
          images=""
          for tag in "${tag_array[@]}"; do
            [[ -n "$tag" ]] && images+="${tag}@${DIGEST} "
          done
          cosign sign --yes --key cosign.key ${images}

      - name: Verify Docker image signature
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest  }}
        run: |
          first_tag=$(echo "${TAGS}" | head -n1)
          cosign verify --key cosign.pub "${first_tag}@${DIGEST}"

      - name: Cleanup signing key
        if: always()
        run: |
          rm -f cosign.key
          rm -f cosign.pub
