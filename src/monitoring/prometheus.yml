scrape_configs:
  - job_name: 'task-manager'
    static_configs:
      - targets: ['app:4000']
    scrape_interval: 10s

    metric_relabel_configs:
      - action: keep
        regex: 'process_cpu_seconds_total|process_resident_memory_bytes|nodejs_eventloop_lag_seconds|nodejs_active_handles_total|nodejs_gc_duration_seconds_sum|process_start_time_seconds|nodejs_version_info'
        source_labels: [__name__]
